name: cj-block

x-app-common: &app-common
  build:
    context: ..
    dockerfile: docker/Dockerfile
  image: cj-block:${IMAGE_TAG:-latest}
  working_dir: /app
  volumes:
    - ../:/app
    - ${CJ_POLICY_CHECKPOINT_DIR:-/home/gao/CJ_block_dockerize/outputs/model_cj/CJ}:/home/gao/CJ_block_dockerize/outputs/model_cj/CJ:ro
  environment:
    MPLCONFIGDIR: /tmp/matplotlib
    XDG_CACHE_HOME: /tmp
    LIVE_PLOT_BIND_HOST: 0.0.0.0
    LIVE_PLOT_PUBLIC_HOST: localhost

services:
  shell:
    <<: *app-common
    container_name: cj-block-shell
    tty: true
    stdin_open: true
    ports:
      - "${LIVE_PLOT_HOST_PORT:-8765}:8765"
    command: bash

  test:
    <<: *app-common
    container_name: cj-block-test
    ports:
      - "${LIVE_PLOT_HOST_PORT_TEST:-8766}:8765"
    command: >
      bash -lc "python test.py --config configs/test_default.yaml"

  demo:
    <<: *app-common
    container_name: cj-block-demo
    ports:
      - "${LIVE_PLOT_HOST_PORT_DEMO:-8767}:8765"
    command: >
      bash -lc "mkdir -p outputs/three_live/demo &&
      python test.py --config configs/test_cj_default.yaml
      --no-use-mcts
      --save-replay
      --replay-path outputs/three_live/demo"

  replay:
    <<: *app-common
    container_name: cj-block-replay
    ports:
      - "${REPLAY_HOST_PORT:-8090}:8080"
    command: >
      python -m http.server 8080 --bind 0.0.0.0

  notebook:
    <<: *app-common
    container_name: cj-block-notebook
    ports:
      - "${JUPYTER_HOST_PORT:-8890}:8888"
      - "${LIVE_PLOT_HOST_PORT_NOTEBOOK:-8768}:8765"
    command: >
      bash -lc "python -c 'import sqlite3; import tianshou; print(\"sqlite\", sqlite3.sqlite_version); print(\"tianshou ok\")' &&
      jupyter lab
      --ip=0.0.0.0
      --port=8888
      --no-browser
      --allow-root
      --ServerApp.token=''
      --ServerApp.password=''
      --ServerApp.default_url=/lab/tree/examples/tutorials/packing_demo.ipynb"

  train-gpu:
    <<: *app-common
    container_name: cj-block-train-gpu
    profiles: ["gpu"]
    tty: true
    stdin_open: true
    ports:
      - "${LIVE_PLOT_HOST_PORT_GPU:-8769}:8765"
      - "${TB_HOST_PORT_GPU:-16006}:6006"
    gpus: all
    environment:
      MPLCONFIGDIR: /tmp/matplotlib
      XDG_CACHE_HOME: /tmp
      LIVE_PLOT_BIND_HOST: 0.0.0.0
      LIVE_PLOT_PUBLIC_HOST: localhost
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
    command: >
      bash -lc "mkdir -p /app/log/tensorboard/docker-gpu &&
      python train.py --config configs/train_default.yaml &
      tensorboard --logdir /app/log/tensorboard/docker-gpu --host 0.0.0.0 --port 6006 && wait"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
