  train_dist_cj:
    build:
      context: .
      dockerfile: Dockerfile
    image: cj-block:${IMAGE_TAG:-latest}
    working_dir: /app
    tty: true
    stdin_open: true
    ports:
      - "${LIVE_PLOT_HOST_PORT_CJ:-8766}:8765"
      - "${TB_HOST_PORT_CJ:-16006}:6006"
    command: >
      bash -lc "mkdir -p /app/log/tensorboard/CJ &&
      python train.py &
      tensorboard --logdir /app/log/tensorboard/CJ --host 0.0.0.0 --port 6006 && wait"
    # command: bash
    gpus: all
    environment:
      LIVE_PLOT_BIND_HOST: 0.0.0.0
      LIVE_PLOT_PUBLIC_HOST: localhost
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
      DATA_DIST: "CJ"
      BUFFER_SIZE: "${BUFFER_SIZE:-12}"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    profiles: ["gpu"]
    container_name: train_dist_cj
    volumes:
      - ./:/app
      - ./outputs/model_cj:/app/outputs


