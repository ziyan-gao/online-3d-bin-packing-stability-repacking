  portainer:
    image: portainer/portainer-ce:2.20.0
    container_name: cj-block-portainer
    ports:
      - "9000:9000"
      - "8000:8000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer-data:/data
    restart: unless-stopped
    environment:
      INITIAL_ADMIN_PASSWORD: admin

volumes:
  portainer-data:
