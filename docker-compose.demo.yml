x-demo-common: &demo-common
  build:
    context: .
    dockerfile: Dockerfile
  image: cj-block:${IMAGE_TAG:-demo}
  working_dir: /app
  volumes:
    - ./:/app
  environment:
    MPLCONFIGDIR: /tmp/matplotlib
    XDG_CACHE_HOME: /tmp
    PACKING_DEVICE: cpu

services:
  train:
    <<: *demo-common
    container_name: cj-block-demo-train
    command: >
      bash -lc "python train.py --config configs/train_demo.yaml"

  test:
    <<: *demo-common
    container_name: cj-block-demo-test
    command: >
      bash -lc "mkdir -p _plotly_live/demo_compose &&
      python test.py --config configs/test_demo.yaml"

  notebook:
    <<: *demo-common
    container_name: cj-block-demo-notebook
    ports:
      - "${JUPYTER_HOST_PORT:-8890}:8888"
    command: >
      bash -lc "python -c 'import sqlite3; import tianshou; print(\"sqlite\", sqlite3.sqlite_version); print(\"tianshou ok\")' &&
      jupyter lab
      --ip=0.0.0.0
      --port=8888
      --no-browser
      --allow-root
      --ServerApp.token=''
      --ServerApp.password=''
      --ServerApp.default_url=/lab/tree/tutorials/packing_demo.ipynb"
